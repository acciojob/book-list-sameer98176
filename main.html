<!DOCTYPE html>
<html>
<head>
    <title>MyBookList</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">
    <h1>MyBookList</h1>

    <div class="form-group">
        <label>Title</label>
        <input type="text" id="title">

        <label>Author</label>
        <input type="text" id="author">

        <label>ISBN#</label>
        <input type="text" id="isbn">

        <!-- IMPORTANT: id="submit" -->
        <button id="submit">Add Book</button>
    </div>

    <!-- IMPORTANT: class="table-striped" -->
    <table id="book-list" class="table-striped">
        <tbody></tbody>
    </table>
</div>

<script src="script.js"></script>
</body>
</html>
