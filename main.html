<!DOCTYPE html>
<html>
<head>
    <title>MyBookList</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">
    <h1>My<span>Book</span>List</h1>

    <div class="form-group">
        <label>Title</label>
        <input type="text" id="title">

        <label>Author</label>
        <input type="text" id="author">

        <label>ISBN#</label>
        <input type="text" id="isbn">

        <button id="addBtn">Add Book</button>
    </div>

    <table id="book-list">
        <thead>
            <tr>
                <th>Title</th>
                <th>Author</th>
                <th>ISBN#</th>
                <th></th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script src="script.js"></script>
</body>
</html>
